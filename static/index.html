<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Kumbara - Bakiye Takip Sistemi</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%236b7280'/></svg>">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 40 40">
                    <circle cx="20" cy="20" r="18" fill="none" stroke="#6b7280" stroke-width="2" />
                    <path d="M20 10 L20 20 L28 20" stroke="#6b7280" stroke-width="2" fill="none" />
                </svg>
                <h1>Stellar Kumbara</h1>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <select id="networkSelect" class="btn-primary" style="padding: 10px 16px;">
                    <option value="testnet">Testnet</option>
                    <option value="mainnet">Mainnet</option>
                </select>
                <button id="connectWallet" class="btn-primary">Freighter Bağlan</button>
            </div>
        </header>

        <main class="main-content">
            <div class="card welcome-card" id="welcomeCard">
                <h2>Hoş Geldiniz</h2>
                <p>Stellar ağındaki bakiyenizi takip edin</p>
                <p class="subtitle">Başlamak için Freighter cüzdanınızı bağlayın</p>
            </div>

            <div class="card balance-card" id="balanceCard" style="display: none;">
                <div class="balance-header">
                    <h2>Kumbara Bakiyesi</h2>
                    <span class="network-badge" id="networkBadge">Testnet</span>
                </div>

                <div class="balance-amount">
                    <span class="currency">XLM</span>
                    <span id="balance" class="amount">0.00</span>
                </div>

                <div class="wallet-info">
                    <label>Cüzdan Adresi:</label>
                    <div class="address-box">
                        <code id="walletAddress"></code>
                        <button id="copyAddress" class="btn-icon" title="Kopyala">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                                <path d="M4 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V2z" />
                                <path d="M2 6a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1H6a3 3 0 0 1-3-3V6H2z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-label">Toplam İşlem</span>
                        <span id="txCount" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Hesap Durumu</span>
                        <span id="accountStatus" class="stat-value">Aktif</span>
                    </div>
                </div>

                <button id="refreshBalance" class="btn-secondary">Bakiyeyi Yenile</button>
                <button id="fundAccount" class="btn-secondary"
                    style="display: none; background: linear-gradient(135deg, #059669 0%, #047857 100%); color: white; margin-top: 8px;">
                    🎁 Testnet'ten Ücretsiz XLM Al (Friendbot)
                </button>
            </div>

            <div class="card error-card" id="errorCard" style="display: none;">
                <h3>⚠️ Hata</h3>
                <p id="errorMessage"></p>
                <button id="retryBtn" class="btn-secondary">Tekrar Dene</button>
            </div>
        </main>

        <footer class="footer">
            <p>Stellar Kumbara Sistemi | Powered by Stellar Network</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/11.2.2/stellar-sdk.min.js"></script>
    <script type="module">
        import freighterApi from "https://esm.sh/@stellar/freighter-api@1.7.1";

        let currentPublicKey = null;
        let currentNetwork = 'testnet';

        function getHorizonUrl() {
            return currentNetwork === 'testnet'
                ? 'https://horizon-testnet.stellar.org'
                : 'https://horizon.stellar.org';
        }

        // Freighter yüklü mü kontrol et
        async function isFreighterInstalled() {
            return await freighterApi.isConnected();
        }

        // Cüzdan bağlantısı
        async function connectWallet() {
            const btn = document.getElementById('connectWallet');
            const networkSelect = document.getElementById('networkSelect');
            currentNetwork = networkSelect.value;

            btn.textContent = 'Bağlanıyor...';
            btn.disabled = true;
            networkSelect.disabled = true;

            try {
                // Freighter yüklü mü kontrol et
                const isInstalled = await isFreighterInstalled();

                if (!isInstalled) {
                    showError('Freighter cüzdan uzantısı bulunamadı. Lütfen Chrome/Firefox uzantısını yükleyin ve sayfayı yenileyin.');
                    btn.textContent = 'Freighter Bağlan';
                    btn.disabled = false;
                    return;
                }

                // Public key al
                const publicKey = await freighterApi.getPublicKey();

                if (!publicKey) {
                    showError('Cüzdan bağlantısı başarısız. Freighter uzantısından izin verin.');
                    btn.textContent = 'Freighter Bağlan';
                    btn.disabled = false;
                    return;
                }

                currentPublicKey = publicKey;

                document.getElementById('walletAddress').textContent = publicKey;
                document.getElementById('networkBadge').textContent = currentNetwork === 'testnet' ? 'Testnet' : 'Mainnet';
                document.getElementById('welcomeCard').style.display = 'none';
                document.getElementById('errorCard').style.display = 'none';
                document.getElementById('balanceCard').style.display = 'block';
                document.getElementById('connectWallet').textContent = 'Bağlı';
                document.getElementById('connectWallet').disabled = true;

                await fetchBalance(publicKey);
            } catch (error) {
                console.error('Bağlantı hatası:', error);
                showError('Cüzdan bağlantısı reddedildi: ' + error.message);
                btn.textContent = 'Freighter Bağlan';
                btn.disabled = false;
            }
        }

        // Bakiye sorgulama
        async function fetchBalance(publicKey) {
            try {
                const server = new StellarSdk.Horizon.Server(getHorizonUrl());
                const account = await server.accounts().accountId(publicKey).call();

                // XLM bakiyesini bul
                const xlmBalance = account.balances.find(b => b.asset_type === 'native');
                const balance = xlmBalance ? parseFloat(xlmBalance.balance).toFixed(7) : '0.00';

                document.getElementById('balance').textContent = balance;

                // İşlem sayısını al
                const transactions = await server.transactions()
                    .forAccount(publicKey)
                    .limit(200)
                    .call();

                document.getElementById('txCount').textContent = transactions.records.length;
                document.getElementById('accountStatus').textContent = 'Aktif';
                document.getElementById('fundAccount').style.display = 'none';

            } catch (error) {
                if (error.response && error.response.status === 404) {
                    // Hesap bulunamadı - 0 bakiye göster
                    document.getElementById('balance').textContent = '0.0000000';
                    document.getElementById('txCount').textContent = '0';
                    document.getElementById('accountStatus').textContent = 'Henüz Aktif Değil';

                    if (currentNetwork === 'testnet') {
                        document.getElementById('fundAccount').style.display = 'block';
                    }
                } else {
                    showError('Bakiye alınırken hata: ' + error.message);
                }
            }
        }

        // Friendbot ile hesap fonlama (sadece testnet)
        async function fundAccount() {
            if (currentNetwork !== 'testnet' || !currentPublicKey) return;

            const btn = document.getElementById('fundAccount');
            btn.textContent = 'XLM gönderiliyor...';
            btn.disabled = true;

            try {
                const response = await fetch(`https://friendbot.stellar.org?addr=${currentPublicKey}`);
                if (response.ok) {
                    alert('✅ Başarılı! 10,000 test XLM hesabınıza gönderildi.');
                    await fetchBalance(currentPublicKey);
                } else {
                    throw new Error('Friendbot isteği başarısız oldu');
                }
            } catch (error) {
                alert('❌ Hata: ' + error.message);
                btn.textContent = '🎁 Testnet\'ten Ücretsiz XLM Al (Friendbot)';
                btn.disabled = false;
            }
        }

        // Hata gösterimi
        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorCard').style.display = 'block';
            document.getElementById('balanceCard').style.display = 'none';
        }

        // Adresi kopyala
        document.getElementById('copyAddress').addEventListener('click', () => {
            const address = document.getElementById('walletAddress').textContent;
            navigator.clipboard.writeText(address).then(() => {
                alert('Adres kopyalandı!');
            });
        });

        // Event listeners
        document.getElementById('connectWallet').addEventListener('click', connectWallet);
        document.getElementById('refreshBalance').addEventListener('click', () => {
            if (currentPublicKey) fetchBalance(currentPublicKey);
        });
        document.getElementById('fundAccount').addEventListener('click', fundAccount);
        document.getElementById('retryBtn').addEventListener('click', () => {
            document.getElementById('errorCard').style.display = 'none';
            document.getElementById('welcomeCard').style.display = 'block';
        });

        // Sayfa yüklendiğinde Freighter kontrolü
        window.addEventListener('load', async () => {
            const isInstalled = await isFreighterInstalled();
            if (isInstalled) {
                console.log('✅ Freighter uzantısı tespit edildi');
            } else {
                console.warn('⚠️ Freighter uzantısı bulunamadı');
            }
        });

        // Global scope'a ekle
        window.connectWallet = connectWallet;
        window.fetchBalance = fetchBalance;
    </script>
</body>

</html>
